version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: marketsmaps-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: marketsmaps
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - marketsmaps-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: marketsmaps-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - marketsmaps-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  marketsmaps-network:
    driver: bridge
